name: Build and Push

on:
  pull_request:
  push:
    branches:
      - main
      - release/*
    tags: '*'
  release:
    types:
      - created

jobs:
  buildx:
    name: Build and Push the Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Compute Tag
        uses: actions/github-script@v6
        id: compute-tag
        with:
          result-encoding: string
          script: |
            if (context.eventName === "pull_request") {
              return "pr-" + context.issue.number;
            }
            if (context.eventName === "push") {
              if (context.ref.startsWith("refs/tags/")) {
                return context.ref.slice(10);
              }
              if (context.ref === "refs/heads/main") {
                return "tmp";
              }
            }
            return "FALSE";

      - name: Compute Latest Tag
        uses: actions/github-script@v6
        id: compute-latest
        with:
          result-encoding: string
          script: |
            if (context.eventName === "push" && context.ref.startsWith("refs/tags/")) {
              return "true";
            }
            if (context.eventName === "release" && context.payload.release && context.payload.release.tag_name) {
              return "true";
            }
            return "false";

      - uses: actions/checkout@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ steps.compute-tag.outputs.result != 'FALSE' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Install Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          version: latest

      - name: Build Image and Push to GitHub Container Registry
        uses: docker/build-push-action@v6
        if: ${{ steps.compute-tag.outputs.result != 'FALSE' }}
        with:
          context: .
          tags: |
            ghcr.io/valentinherrmann/artemis-maven-docker:${{ steps.compute-tag.outputs.result }}
            ${{ steps.compute-latest.outputs.result == 'true' && 'ghcr.io/valentinherrmann/artemis-maven-docker:latest' || '' }}
          platforms: linux/amd64,linux/arm64/v8
          push: ${{ !startsWith(steps.compute-tag.outputs.result, 'pr-') }}

